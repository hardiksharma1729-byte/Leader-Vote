<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

/* Heading */

.heading{
color:white;
font-size:55px;
letter-spacing:4px;
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,255,255,0.5);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px #00e5ff;}
}

/* Feedback card */

.form-box{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
padding:40px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
display:flex;
flex-direction:column;
gap:15px;
width:370px;
border:1px solid rgba(255,255,255,0.2);
}

/* labels */

label{
color:white;
font-weight:bold;
letter-spacing:1px;
}

/* inputs */

input,textarea{
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
outline:none;
background:rgba(255,255,255,0.9);
}

/* textarea */

textarea{
resize:none;
height:120px;
}

/* button */

button{
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

button:hover{
transform:scale(1.08);
box-shadow:0 10px 35px rgba(0,0,0,0.8);
}

/* home button */

.home{
margin-top:25px;
padding:12px 30px;
background:linear-gradient(45deg,#ffd700,#ffb347);
color:black;
text-decoration:none;
font-weight:bold;
border-radius:30px;
transition:0.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.6);
}

.home:hover{
transform:scale(1.1);
box-shadow:0 10px 35px rgba(0,0,0,0.8);
}

</style>

</head>

<body>

<h1 class="heading">Feedback</h1>

<form class="form-box" action="https://formspree.io/f/mreyvboj" method="POST">

<label>Your Feedback</label>
<textarea name="feedback" placeholder="Write your thoughts..." required></textarea>

<button type="submit">Send Feedback</button>

</form>

<a href="{{ url_for('home') }}" class="home">HOME</a>

</body>

</html>
