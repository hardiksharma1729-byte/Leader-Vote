<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL Fixtures</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

/* HEADER */

header{
    text-align:center;
    padding:30px;
    font-size:35px;
    font-weight:bold;
}

/* MATCH CONTAINER */

.container{
    width:80%;
    margin:auto;
}

/* MATCH CARD */

.match{
    background:#1f2c40;
    border-radius:12px;
    padding:20px;
    margin:20px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.3s;
}

.match:hover{
    transform:scale(1.02);
    background:#2e3f5e;
}

/* TEAMS */

.teams{
    font-size:22px;
    font-weight:bold;
}

/* DETAILS */

.details{
    text-align:right;
    font-size:15px;
    opacity:0.8;
}

</style>
</head>

<body>

<header>
🏏 IPL 2026 Fixtures
</header>

<div class="container">

<div class="match">

</div>
</div>

</div>

</div>

</body>
</html>
