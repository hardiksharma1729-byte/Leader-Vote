<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#141e30,#243b55,#0f2027);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
}

/* Heading */

h2{
font-size:50px;
letter-spacing:4px;
margin-bottom:30px;
text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* Contact Box */

.form-box{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 40px rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
gap:12px;
}

/* Labels */

label{
font-size:16px;
font-weight:bold;
}

/* Inputs */

input, textarea{
width:100%;
padding:12px;
border:none;
border-radius:8px;
outline:none;
font-size:15px;
background:rgba(255,255,255,0.9);
}

/* textarea */

textarea{
resize:none;
height:100px;
}

/* Send button */

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,75,43,0.7);
}

/* Home Button */

.home{
margin-top:25px;
padding:12px 35px;
text-decoration:none;
font-weight:bold;
color:black;
background:linear-gradient(45deg,#ffd700,#ffb347);
border-radius:30px;
transition:0.3s;
box-shadow:0 6px 25px rgba(0,0,0,0.6);
}

.home:hover{
transform:scale(1.1);
box-shadow:0 12px 40px rgba(0,0,0,0.9);
}

</style>

</head>

<body>

<h2>Contact Us</h2>

<form class="form-box" action="https://formspree.io/f/mojkzvow" method="POST">

<label for="name">Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email</label>
<input type="email" id="email" name="email" required>

<label for="message">Message</label>
<textarea id="message" name="message" required></textarea>

<button type="submit">Send Message</button>

</form>

<a href="{{ url_for('home') }}" class="home">HOME</a>

</body>
</html>
